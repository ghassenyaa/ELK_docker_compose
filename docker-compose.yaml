version: '3.8'

services:
  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.authc.api_key.enabled=true
    volumes:
      - ./data/elasticsearch:${ES_DATA_DIR}
    ports:
      - "${ES_PORT}:9200"
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL", "curl -s -k https://localhost:9200 | grep -q 'missing authentication credentials'"]
      interval: 10s
      timeout: 10s
      retries: 120

  # Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://${ES_HOST}:${ES_PORT}
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "${KIBANA_PORT}:5601"
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL", "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'"]
      interval: 10s
      timeout: 10s
      retries: 120

  # Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:${LOGSTASH_VERSION}
    container_name: logstash
    depends_on:
      - elasticsearch
    environment:
      - LS_JAVA_OPTS=${ES_JAVA_OPTS}
      - ELASTICSEARCH_HOSTS=http://${ES_HOST}:${ES_PORT}
      - ELASTICSEARCH_USERNAME=logstash_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./config/logstash:${LOGSTASH_CONFIG_FILE}
    ports:
      - "5044:5044"   # Beats input
      - "5000:5000"   # TCP input
    networks:
      - elk

  # Metricbeat
  metricbeat:
    image: docker.elastic.co/beats/metricbeat:${METRICBEAT_VERSION}
    container_name: metricbeat
    depends_on:
      - elasticsearch
      - kibana
    user: root
    volumes:
      - ./config/metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /proc:/hostfs/proc:ro
      - /:/hostfs:ro
    networks:
      - elk

  # Fleet Server
  fleet-server:
    image: docker.elastic.co/beats/elastic-agent:${ELASTIC_VERSION}
    container_name: fleet-server
    depends_on:
      - elasticsearch
      - kibana
    environment:
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://${ES_HOST}:${ES_PORT}
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_ENROLLMENT_TOKEN}
      - FLEET_SERVER_POLICY_ID=fleet-server-policy
      - FLEET_SERVER_PORT=${FLEET_SERVER_PORT}
      - FLEET_URL=${FLEET_URL}
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "${FLEET_SERVER_PORT}:${FLEET_SERVER_PORT}"
    networks:
      - elk

networks:
  elk:
    driver: bridge
